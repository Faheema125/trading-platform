name: Debug OIDC

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC Token and decode claims
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo "Token received (first 20 chars): ${TOKEN:0:20}..."
          
          # Decode the JWT payload (middle part)
          PAYLOAD=$(echo $TOKEN | cut -d'.' -f2 | base64 -d 2>/dev/null || echo $TOKEN | cut -d'.' -f2 | base64 --decode 2>/dev/null)
          echo "=== OIDC Token Claims ==="
          echo $PAYLOAD | jq .
          echo ""
          echo "=== Key fields ==="
          echo "sub: $(echo $PAYLOAD | jq -r '.sub')"
          echo "aud: $(echo $PAYLOAD | jq -r '.aud')"
          echo "iss: $(echo $PAYLOAD | jq -r '.iss')"
          echo "repository: $(echo $PAYLOAD | jq -r '.repository')"

      - name: Try assume role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Verify
        run: aws sts get-caller-identity
