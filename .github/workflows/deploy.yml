name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  API_IMAGE_NAME: trading-platform/api
  WORKER_IMAGE_NAME: trading-platform/worker

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.build-api.outputs.image }}
      worker_image: ${{ steps.build-worker.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        id: build-api
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f docker/api.Dockerfile -t $REGISTRY/$API_IMAGE_NAME:$IMAGE_TAG -t $REGISTRY/$API_IMAGE_NAME:latest .
          docker push $REGISTRY/$API_IMAGE_NAME:$IMAGE_TAG
          docker push $REGISTRY/$API_IMAGE_NAME:latest
          echo "image=$REGISTRY/$API_IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and push Worker image
        id: build-worker
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f docker/worker.Dockerfile -t $REGISTRY/$WORKER_IMAGE_NAME:$IMAGE_TAG -t $REGISTRY/$WORKER_IMAGE_NAME:latest .
          docker push $REGISTRY/$WORKER_IMAGE_NAME:$IMAGE_TAG
          docker push $REGISTRY/$WORKER_IMAGE_NAME:latest
          echo "image=$REGISTRY/$WORKER_IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy-dev:
    name: Deploy Dev
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: infra/environments/dev
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/environments/dev
        run: |
          terraform plan \
            -var="api_image=${{ needs.build.outputs.api_image }}" \
            -var="worker_image=${{ needs.build.outputs.worker_image }}" \
            -out=plan.tfplan

      - name: Terraform Apply
        working-directory: infra/environments/dev
        run: terraform apply plan.tfplan

      - name: Wait for ECS deployment to stabilize
        run: |
          echo "Waiting for API service to stabilize..."
          aws ecs wait services-stable \
            --cluster dev-trading-cluster \
            --services dev-api
          echo "Waiting for Worker service to stabilize..."
          aws ecs wait services-stable \
            --cluster dev-trading-cluster \
            --services dev-worker
          echo "All services stable!"

  plan-prod:
    name: Plan Prod
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: infra/environments/prod
        run: terraform init

      - name: Terraform Plan (prod - plan only, never apply)
        working-directory: infra/environments/prod
        run: |
          terraform plan \
            -var="api_image=${{ needs.build.outputs.api_image }}" \
            -var="worker_image=${{ needs.build.outputs.worker_image }}"
